name: Testes E2E

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  e2e:
    name: Rodar Testes E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Criar .env do backend
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        run: |
          mkdir -p backend

          if [ -n "$BACKEND_ENV" ]; then
            printf '%s\n' "$BACKEND_ENV" > backend/.env
          else
            cat > backend/.env <<'EOF'
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=smv
          DATABASE_URL=postgresql://postgres:postgres@postgres:5432/smv

          REDIS_URL=redis://redis:6379/0

          SECRET_KEY_JWT=ci-test-secret-key
          ALGORITHM=HS256

          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=minioadmin
          MINIO_BUCKET=smp-fotos

          CREA_API_KEY=ci-test-key
          CREA_API_URL=https://www.consultacrea.com.br/api/index.php

          SMTP_SERVER=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USER=ci@example.com
          SMTP_PASSWORD=ci-password
          FROM_EMAIL=ci@example.com
          EOF
          fi

          test -s backend/.env
          grep -q '^POSTGRES_USER=' backend/.env
          grep -q '^POSTGRES_PASSWORD=' backend/.env
          grep -q '^POSTGRES_DB=' backend/.env
          grep -q '^DATABASE_URL=' backend/.env

      - name: Build das imagens Docker
        run: docker compose build

      - name: Subir aplicação com Docker Compose
        run: |
          docker compose up -d || {
            docker compose ps
            docker compose logs --no-color postgres
            exit 1
          }

      - name: Aguardar serviços ficarem prontos
        run: |
          echo "Aguardando backend..."
          timeout 120 bash -c 'until curl -sf http://localhost:8000/docs > /dev/null; do sleep 3; done'

          echo "Aguardando frontend..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 3; done'

          docker compose ps

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências dos testes
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt

      - name: Instalar Chromium do Playwright
        run: playwright install chromium --with-deps

      - name: Rodar testes E2E
        run: |
          mkdir -p reports
          pytest tests/e2e \
            --html=reports/relatorio-e2e.html \
            --self-contained-html \
            -v

      - name: Salvar logs do Docker Compose
        if: failure()
        run: |
          mkdir -p reports
          docker compose logs --no-color > reports/docker-compose.log

      - name: Publicar relatório dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-e2e
          path: |
            reports/relatorio-e2e.html
            reports/docker-compose.log
          if-no-files-found: warn
          retention-days: 30

      - name: Derrubar Docker Compose
        if: always()
        run: docker compose down -v
