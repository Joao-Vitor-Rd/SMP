[pytest]
; onde estão os testes
testpaths = tests/e2e tests/unit

; prefixo dos arquivos de teste
python_files = test_*.py

; prefixo das funções de teste
python_classes = Test*
python_functions = test_*

; opções padrão (verbose + para no primeiro erro)
addopts = -v --tb=short

; suas tags customizadas por sprint/US
markers =
    sprint_01: testes da sprint 1
    sprint_02: testes da sprint 2
    us_01: user story 01 - cadastro
    us_02: user story 02 - login
    us_04: user story 04
    us_05: user story 05
    smoke: testes rápidos de sanidade
    unit: testes unitários
